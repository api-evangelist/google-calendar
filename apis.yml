aid: google-calendar
name: Google Calendar
description: >-
  The Google Calendar API provides RESTful access to Google Calendar data,
  enabling applications to create, view, and manage calendar events, access
  control lists, and user settings. It supports creating and managing multiple
  calendars, querying free/busy information, setting up push notifications for
  changes, and integrating calendar functionality into third-party applications.
